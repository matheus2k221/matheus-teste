<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula3</title>
    <style type="text/css">
        *{margin:0; padding: 0;}
        div{width: 100px; height: 100px;}
        #item1{background-color: red; transition:  2s;}
        #item2:hover{background-color: blue; transition: 2s;}
        #item2:hover{background-color: black; transform: rotate(127deg); transition: 2s;}
        #item3{background-image: linear-gradient(30deg, cyan, magenta, yellow); transition: 2s;}

    </style>
</head>
<body>
    <div id="item1"></div>
    <div id="item2"></div>
    <div id="item3"></div>

</body>
</html>
