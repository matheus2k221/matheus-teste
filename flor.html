<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Minha Fazenda com Flor Interativa</title>
<style>
  /* --- Cenário e Fundo --- */
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
    
    /* Imagem de fundo de uma fazenda (usando Unsplash) */
    background-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1920');
    background-size: cover;
    background-position: center;
  }

  /* --- O Sol (Canto Superior Esquerdo) --- */
  .sol {
    width: 100px;
    height: 100px;
    background-color: #ffeb3b; /* Amarelo */
    border-radius: 50%;
    position: absolute;
    top: 40px;
    left: 40px;
    /* Brilho do sol */
    box-shadow: 0 0 40px #ffeb3b, 0 0 80px #ffcc00;
  }

  /* --- Contêiner Principal da Flor e do Caule --- */
  .cenario-flor {
    width: 300px;
    height: 450px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* --- Efeito de Giro na Cabeça da Flor --- */
  .cabeca-flor {
    width: 300px;
    height: 300px;
    position: absolute;
    top: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
    
    /* Transição suave para o efeito de rotação */
    transition: transform 3s linear;
  }

  /* Quando passa o mouse na flor, ela gira 360 graus lentamente */
  .cabeca-flor:hover {
    transform: rotate(360deg);
  }

  /* --- O Miolo --- */
  .miolo {
    width: 80px;
    height: 80px;
    background-color: #ff9800; /* Laranja */
    border-radius: 50%;
    position: absolute;
    z-index: 4;
  }

  /* --- As Pétalas --- */
  .petala {
    width: 100px;
    height: 100px;
    background-color: #e1bee7; /* Lilás */
    border-radius: 50%;
    position: absolute;
  }

  /* Distribuição das 6 pétalas ao redor do miolo */
  .p1 { transform: rotate(0deg) translateY(-65px); }
  .p2 { transform: rotate(60deg) translateY(-65px); }
  .p3 { transform: rotate(120deg) translateY(-65px); }
  .p4 { transform: rotate(180deg) translateY(-65px); }
  .p5 { transform: rotate(240deg) translateY(-65px); }
  .p6 { transform: rotate(300deg) translateY(-65px); }

  /* --- O Caule --- */
  .caule {
    width: 14px;
    height: 220px;
    background-color: #4caf50; /* Verde */
    position: absolute;
    bottom: 30px;
    border-radius: 7px;
    z-index: 1;
  }

  /* --- As Folhas --- */
  .folha {
    width: 80px;
    height: 50px;
    background-color: #4caf50;
    position: absolute;
    bottom: 130px;
    z-index: 2;
  }

  /* Folha Esquerda */
  .folha-esquerda {
    left: 55px;
    border-radius: 0px 40px 0px 40px; 
    transform: rotate(-30deg);
  }

  /* Folha Direita (Adicionada) */
  .folha-direita {
    right: 55px;
    border-radius: 40px 0px 40px 0px; /* Invertido para o lado direito */
    transform: rotate(30deg);
  }

  /* --- A Grama (Base da tela) --- */
  .gramado {
    width: 100%;
    height: 40px;
    background-color: #388e3c; /* Verde escuro */
    position: absolute;
    bottom: 0;
    left: 0;
    z-index: 5;
    /* Efeito simples de "folhas de grama" usando sombra repetida */
    box-shadow: 0 -10px 0 #4caf50;
  }

  /* --- Texto de Legenda --- */
  .legenda {
    background-color: rgba(255, 255, 255, 0.8); /* Fundo semi-transparente para leitura */
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 24px;
    margin-top: 20px;
    z-index: 6;
  }
</style>
</head>
<body>

  <div class="sol"></div>

  <div class="cenario-flor">
    <div class="caule"></div>
    <div class="folha folha-esquerda"></div>
    <div class="folha folha-direita"></div>
    
    <div class="cabeca-flor">
      <div class="miolo"></div>
      <div class="petala p1"></div>
      <div class="petala p2"></div>
      <div class="petala p3"></div>
      <div class="petala p4"></div>
      <div class="petala p5"></div>
      <div class="petala p6"></div>
    </div>
  </div>

  <div class="gramado"></div>

  <div class="legenda">
    Passe o mouse na flor para vê-la girar! 🌸
  </div>

</body>
</html>
